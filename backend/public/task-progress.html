<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务进度反馈</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: #172033;
      background: #f5f7fb;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .card {
      width: min(680px, 100%);
      border: 1px solid #e5e9f0;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 16px 42px rgba(15, 23, 42, .08);
      padding: 22px;
      display: grid;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 24px; line-height: 1.35; }
    .sub { margin: 0; color: #667085; font-size: 14px; line-height: 1.6; }
    .meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .meta-item { border: 1px solid #eef1f5; border-radius: 10px; padding: 11px; background: #fafbfd; }
    .meta-item span { display: block; color: #7b8494; font-size: 12px; font-weight: 800; margin-bottom: 5px; }
    .meta-item strong { display: block; color: #263244; font-size: 14px; line-height: 1.45; word-break: break-word; }
    .actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
    button {
      min-height: 46px;
      border: 1px solid #2563eb;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .status { min-height: 24px; color: #667085; font-size: 14px; font-weight: 800; }
    .status.ok { color: #166534; }
    .status.error { color: #b42318; }
    @media (max-width: 640px) {
      .meta, .actions { grid-template-columns: 1fr; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div>
      <h1 id="taskTitle">任务进度反馈</h1>
      <p id="taskSub" class="sub">正在读取任务信息...</p>
    </div>
    <div class="meta">
      <div class="meta-item"><span>任务编号</span><strong id="taskNo">-</strong></div>
      <div class="meta-item"><span>当前状态</span><strong id="taskStatus">-</strong></div>
      <div class="meta-item"><span>基金平台</span><strong id="projectName">-</strong></div>
      <div class="meta-item"><span>执行人</span><strong id="assigneeName">-</strong></div>
    </div>
    <div class="actions">
      <button id="assetButton" onclick="openAssetSheet()">填写项目资产</button>
    </div>
    <div id="statusText" class="status">提交交付后将进入成品审核。</div>
  </main>

  <script src="/js/workflow-session.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const taskId = params.get("taskId") || "";
    const taskToken = params.get("token") || "";
    const taskNo = params.get("taskNo") || "";
    let assetSheetUrl = "";
    let currentTaskStatus = "";
    let workflowSessionEstablished = false;

    function qs(id) { return document.getElementById(id); }
    function statusLabel(status) {
      return { todo: "未开始", pending: "未开始", assigned: "已指派", in_progress: "进行中", blocked: "受阻", pending_review: "待审核", completed: "已完成" }[status] || status || "-";
    }
    function setStatus(message, type) {
      qs("statusText").textContent = message;
      qs("statusText").className = `status ${type || ""}`;
    }
    function api(action) {
      return `/api/v1/tasks/${encodeURIComponent(taskId)}/progress-feedback/${action}?token=${encodeURIComponent(taskToken)}`;
    }
    async function loadContext() {
      if (!taskId || !taskToken) {
        setStatus("缺少任务访问参数，请从任务消息按钮进入。", "error");
        return;
      }
      try {
        const response = await fetch(api("context"));
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || "读取任务失败");
        if (!workflowSessionEstablished) {
          window.XlyqWorkflowSession.store(result.assigneeSession);
        }
        const task = result.task || {};
        currentTaskStatus = task.status || "";
        assetSheetUrl = result.assetSheetUrl || "";
        qs("taskTitle").textContent = task.task_name || taskNo || "任务";
        qs("taskSub").textContent = "进入项目资产填写交付内容；提交后依次进入成品审核和客户确认。";
        qs("taskNo").textContent = task.task_no || taskNo || "-";
        qs("taskStatus").textContent = result.workflow?.statusLabel || statusLabel(task.status);
        qs("projectName").textContent = result.fundPlatformLabel || result.project?.project_name || "-";
        qs("assigneeName").textContent = result.assignee?.display_name || result.assignee?.username || "-";
        if (task.status === "pending_review") setStatus("交付已提交，当前正在审核中，可进入查看资产。", "ok");
        if (task.status === "completed") setStatus("任务已完成，可进入查看已归档资产。", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }
    function openAssetSheet() {
      if (!assetSheetUrl) return setStatus("项目资产地址尚未生成，请联系派发人。", "error");
      const target = new URL(assetSheetUrl, location.origin);
      if (!["pending_review", "completed"].includes(currentTaskStatus)) {
        target.searchParams.set("start", "1");
      }
      location.href = target.toString();
    }
    async function bootstrapProgressPage() {
      try {
        workflowSessionEstablished = Boolean(
          await window.XlyqWorkflowSession.establishFromLocation(),
        );
      } catch (error) {
        console.warn("Workflow account handoff failed", error);
      }
      await loadContext();
    }
    bootstrapProgressPage();
  </script>
</body>
</html>
