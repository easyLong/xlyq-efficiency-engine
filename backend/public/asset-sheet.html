<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务交付登记</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #172033;
      background: #f6f8fb;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 16px auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: #fff;
      border: 1px solid #e5e9f0;
      border-radius: 12px;
      box-shadow: 0 10px 26px rgba(16, 24, 40, .05);
      padding: 16px;
    }
    .task-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 18px;
      align-items: start;
    }
    .workspace { min-width: 0; }
    .task-kicker { color: #667085; font-size: 12px; font-weight: 900; margin-bottom: 7px; }
    .task-title { margin: 0; font-size: 22px; line-height: 1.32; color: #111827; }
    .task-sub { margin: 7px 0 0; color: #667085; font-size: 13px; line-height: 1.55; }
    .tabs { display: none; }
    .task-overview {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: end;
    }
    .task-meta {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }
    .detail-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px 14px;
    }
    .detail-row { display: grid; gap: 5px; }
    .detail-label { color: #7b8494; font-size: 12px; font-weight: 900; }
    .detail-value { color: #263244; font-size: 14px; font-weight: 800; line-height: 1.45; word-break: break-word; }
    .tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 23px;
      padding: 2px 9px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 900;
    }
    .tag.warn { background: #fff3df; color: #9a4b13; }
    .tag.ok { background: #e8f8ed; color: #166534; }
    .summary-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .summary-box { border: 1px solid #edf0f5; border-radius: 10px; padding: 10px; background: #fafbfd; }
    .summary-box span { display: block; color: #667085; font-size: 12px; margin-bottom: 5px; }
    .summary-box strong { font-size: 18px; line-height: 1.1; }
    .workflow-box {
      border: 1px solid #d7e6ff;
      border-radius: 10px;
      background: #f7fbff;
      padding: 12px;
      display: grid;
      gap: 5px;
    }
    .workflow-box span { color: #667085; font-size: 12px; font-weight: 900; }
    .workflow-box strong { color: #1d4ed8; font-size: 14px; line-height: 1.45; }
    h2 { margin: 0; font-size: 19px; color: #111827; }
    .delivery-panel { padding: 0; overflow: hidden; }
    .delivery-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding: 18px 18px 14px;
      border-bottom: 1px solid #eef1f6;
      background: #fff;
    }
    .delivery-header p { margin: 5px 0 0; color: #667085; font-size: 13px; line-height: 1.5; }
    .delivery-kicker { color: #2563eb; font-size: 12px; font-weight: 900; margin-bottom: 5px; }
    .delivery-body { display: grid; gap: 0; }
    .delivery-section { padding: 18px; border-bottom: 1px solid #eef1f6; }
    .delivery-main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }
    .section-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
    .section-title { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .step-pill {
      width: 25px;
      height: 25px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      background: #eef4ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 900;
    }
    .section-head h3 { margin: 0; color: #111827; font-size: 16px; line-height: 1.3; }
    .section-head p { margin: 3px 0 0; color: #667085; font-size: 12px; line-height: 1.45; }
    .upload-zone {
      border: 1.5px dashed #aebbd0;
      border-radius: 12px;
      min-height: 116px;
      background: #f8fafc;
      display: grid;
      place-items: center;
      text-align: left;
      padding: 14px 16px;
      transition: border .15s ease, background .15s ease;
    }
    .upload-zone > div {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }
    .upload-zone.dragover { border-color: #2563eb; background: #eef6ff; }
    .upload-zone strong { display: block; margin-bottom: 6px; font-size: 16px; }
    .upload-zone p { margin: 0; color: #667085; font-size: 13px; line-height: 1.6; }
    .upload-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; margin-top: 0; }
    input, textarea {
      width: 100%;
      border: 1px solid #d7dee8;
      border-radius: 9px;
      background: #fff;
      color: #111827;
      padding: 10px 11px;
      outline: none;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { min-height: 92px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(126px, 1fr)); gap: 10px; max-height: 420px; overflow: auto; padding-right: 2px; }
    .asset-card { border: 1px solid #e5e9f0; border-radius: 10px; background: #fff; overflow: hidden; }
    .asset-preview { aspect-ratio: 1.18; background: #f3f6fa; display: grid; place-items: center; color: #98a2b3; font-size: 12px; overflow: hidden; }
    .asset-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .asset-meta { padding: 9px; display: grid; gap: 7px; }
    .asset-url { color: #475467; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-actions { display: flex; gap: 6px; }
    .pending-note { color: #1d4ed8; font-size: 12px; font-weight: 900; }
    button {
      border: 1px solid #2563eb;
      background: #2563eb;
      color: #fff;
      border-radius: 9px;
      min-height: 38px;
      padding: 8px 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary { background: #fff; color: #1f2937; border-color: #d7dee8; }
    button.ghost { background: #f8fafc; color: #475467; border-color: #e5e9f0; min-height: 30px; padding: 5px 8px; font-size: 12px; }
    button.danger { background: #fff7f5; color: #b42318; border-color: #ffd1c8; min-height: 30px; padding: 5px 8px; font-size: 12px; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .link-section { display: grid; grid-template-columns: minmax(0, 1fr); gap: 10px; }
    .save-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      background: #fbfcfe;
    }
    .save-actions { display: flex; gap: 8px; align-items: center; }
    .status { color: #667085; font-size: 13px; font-weight: 800; line-height: 1.55; }
    .status.ok { color: #166534; }
    .status.error { color: #b42318; }
    .empty { min-height: 132px; border: 1px dashed #d7dee8; border-radius: 12px; padding: 18px; color: #98a2b3; text-align: center; background: #fafbfd; display: grid; place-items: center; }
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: block;
      padding: 18px;
      background: rgba(15, 23, 42, .34);
      backdrop-filter: blur(3px);
    }
    .confirm-dialog {
      width: min(400px, 100%);
      position: fixed;
      border: 1px solid #ffd1c8;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .22);
      overflow: hidden;
    }
    .confirm-dialog-body {
      padding: 17px 17px 13px;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 11px;
      align-items: start;
    }
    .confirm-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fff7f5;
      color: #b42318;
      font-weight: 900;
      font-size: 17px;
    }
    .confirm-dialog h3 { margin: 1px 0 6px; color: #111827; font-size: 17px; }
    .confirm-dialog p { margin: 0; color: #667085; font-size: 13px; line-height: 1.6; }
    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 11px 13px;
      background: #fafbfd;
      border-top: 1px solid #eef1f6;
    }
    .confirm-actions button { min-height: 34px; padding: 7px 12px; }
    .hidden { display: none !important; }
    @media (max-width: 1040px) {
      .delivery-main-grid { grid-template-columns: 1fr; }
      .upload-zone { min-height: 116px; }
      .empty { min-height: 120px; }
      .asset-grid { max-height: none; }
    }
    @media (max-width: 900px) {
      .task-overview, .task-meta { grid-template-columns: 1fr; }
      .summary-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .detail-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .upload-zone { text-align: center; }
      .upload-zone > div { display: grid; justify-items: center; }
      .upload-actions { justify-content: center; }
      .save-bar { align-items: stretch; flex-direction: column; }
      .save-actions { justify-content: flex-end; }
    }
    @media (max-width: 620px) {
      .summary-row, .detail-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <aside class="panel task-panel">
      <div class="task-overview">
        <div>
          <div class="task-kicker">任务交付</div>
          <h1 id="taskTitle" class="task-title">任务详情</h1>
          <p id="taskSub" class="task-sub">读取任务信息中...</p>
        </div>
        <div class="summary-row">
          <div class="summary-box"><span>图片</span><strong id="imageCount">0</strong></div>
          <div class="summary-box"><span>链接</span><strong id="linkCount">0</strong></div>
          <div class="summary-box"><span>状态</span><strong id="briefStatus">-</strong></div>
        </div>
      </div>
      <div class="tabs"><div class="tab">详情</div></div>
      <div class="task-meta">
        <div class="workflow-box">
          <span>下一步</span>
          <strong id="nextAction">读取中...</strong>
        </div>
        <div id="taskDetails" class="detail-list"></div>
      </div>
    </aside>

    <section class="workspace">
      <div class="panel delivery-panel">
        <div class="delivery-header">
          <div>
            <div class="delivery-kicker">项目资产</div>
            <h2>交付内容登记</h2>
            <p>上传图片资产，填写合作链接后提交。</p>
          </div>
          <button class="secondary" onclick="reloadContext()">刷新</button>
        </div>

        <div class="delivery-body">
          <div class="delivery-section">
            <div class="delivery-main-grid">
              <div>
                <div class="section-head">
                  <div class="section-title">
                    <span class="step-pill">1</span>
                    <div>
                      <h3>上传图片资产</h3>
                      <p>PNG、JPG、WEBP、GIF，单张不超过 8MB。</p>
                    </div>
                  </div>
                  <button class="secondary" onclick="document.getElementById('fileInput').click()">选择图片</button>
                </div>
                <div id="uploadZone" class="upload-zone">
                  <div>
                    <div>
                      <strong>拖拽图片到这里</strong>
                      <p>也可以直接粘贴截图。</p>
                    </div>
                    <div class="upload-actions">
                      <button onclick="document.getElementById('fileInput').click()">上传图片</button>
                    </div>
                  </div>
                </div>
                <input id="fileInput" class="hidden" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple onchange="uploadSelectedFiles(this.files)" />
              </div>

            </div>
          </div>

          <div class="delivery-section">
            <div class="section-head">
              <div class="section-title">
                <span class="step-pill">2</span>
                <div>
                  <h3>已添加图片</h3>
                  <p>保存后同步到后台统计口径。</p>
                </div>
              </div>
              <button class="secondary" onclick="clearImages()">清空</button>
            </div>
            <div id="assetGrid" class="asset-grid"></div>
          </div>

          <div class="delivery-section">
            <div class="section-head">
              <div class="section-title">
                <span class="step-pill">3</span>
                <div>
                  <h3>合作链接</h3>
                  <p>填写最终的合作交付页面地址。</p>
                </div>
              </div>
            </div>
            <div class="link-section">
              <input id="linkUrl" placeholder="粘贴合作链接" oninput="saveDraft()" />
            </div>
          </div>

          <div class="save-bar">
            <div id="saveStatus" class="status">添加图片或合作链接后提交交付，提交后进入管理者验收。</div>
            <div class="save-actions">
              <button id="saveButton" onclick="saveDelivery()">提交交付</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="confirmBackdrop" class="dialog-backdrop hidden" onclick="handleConfirmBackdropClick(event)">
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" onclick="event.stopPropagation()">
      <div class="confirm-dialog-body">
        <div class="confirm-icon">!</div>
        <div>
          <h3 id="confirmTitle">确认操作</h3>
          <p id="confirmMessage">此操作需要确认。</p>
        </div>
      </div>
      <div class="confirm-actions">
        <button id="confirmCancelButton" class="secondary" onclick="resolveConfirmDialog(false)">取消</button>
        <button id="confirmOkButton" class="danger" onclick="resolveConfirmDialog(true)">确认删除</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const taskId = params.get("taskId") || "default";
    const taskNo = params.get("taskNo") || "任务";
    const taskToken = params.get("token") || "";
    const storageKey = `asset-delivery:${taskId}`;
    const legacyStorageKey = `asset-sheet:${taskId}`;
    const maxImageCount = 80;
    const maxUrlLength = 500;
    let context = null;
    let pendingImagePreviews = [];
    let pendingConfirmResolve = null;
    let lastPointerPosition = null;

    document.addEventListener("pointerdown", event => {
      if (!event.target?.closest?.("#confirmBackdrop")) {
        lastPointerPosition = { x: event.clientX, y: event.clientY };
      }
    }, true);

    function confirmDialog({
      title = "确认操作",
      message = "此操作需要确认。",
      okText = "确认",
      cancelText = "取消",
    } = {}) {
      document.getElementById("confirmTitle").textContent = title;
      document.getElementById("confirmMessage").textContent = message;
      document.getElementById("confirmOkButton").textContent = okText;
      document.getElementById("confirmCancelButton").textContent = cancelText;
      document.getElementById("confirmBackdrop").classList.remove("hidden");
      positionConfirmDialog();
      document.getElementById("confirmCancelButton").focus();
      return new Promise(resolve => {
        pendingConfirmResolve = resolve;
      });
    }

    function positionConfirmDialog() {
      const backdrop = document.getElementById("confirmBackdrop");
      const dialog = backdrop?.querySelector(".confirm-dialog");
      if (!dialog) return;
      const margin = 14;
      const rect = dialog.getBoundingClientRect();
      const point = lastPointerPosition || {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      const left = Math.min(
        Math.max(point.x - rect.width - 20, margin),
        Math.max(margin, window.innerWidth - rect.width - margin),
      );
      const preferredTop = point.y - rect.height - 20;
      const fallbackTop = point.y + 20;
      const top = preferredTop >= margin
        ? preferredTop
        : Math.min(fallbackTop, Math.max(margin, window.innerHeight - rect.height - margin));
      dialog.style.left = `${left}px`;
      dialog.style.top = `${top}px`;
    }

    function resolveConfirmDialog(value) {
      document.getElementById("confirmBackdrop").classList.add("hidden");
      if (pendingConfirmResolve) {
        pendingConfirmResolve(Boolean(value));
        pendingConfirmResolve = null;
      }
    }

    function handleConfirmBackdropClick(event) {
      if (event.target?.id === "confirmBackdrop") resolveConfirmDialog(false);
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !document.getElementById("confirmBackdrop")?.classList.contains("hidden")) {
        resolveConfirmDialog(false);
      }
    });

    function emptyDraft() {
      return { imageUrls: [], linkUrl: "" };
    }

    function loadDraft() {
      const current = localStorage.getItem(storageKey);
      if (current) return normalizeDraft(JSON.parse(current));
      const legacyRows = JSON.parse(localStorage.getItem(legacyStorageKey) || "[]");
      if (legacyRows.length) {
        return normalizeDraft({ imageUrls: legacyRows.map(row => row.assetUrl), linkUrl: "" });
      }
      return emptyDraft();
    }

    function normalizeDraft(value) {
      const imageUrls = Array.isArray(value?.imageUrls) ? value.imageUrls : [];
      return {
        imageUrls: unique(imageUrls.map(item => String(item || "").trim()).filter(isPersistableImageUrl)),
        linkUrl: String(value?.linkUrl || ""),
      };
    }

    function isPersistableImageUrl(url) {
      const value = String(url || "").trim();
      return Boolean(value) && !value.startsWith("data:");
    }

    function saveDraft() {
      const draft = loadDraft();
      draft.linkUrl = document.getElementById("linkUrl").value.trim();
      if (draft.linkUrl.length > maxUrlLength) {
        setStatus("合作链接不能超过 500 个字符。", "error");
        return;
      }
      localStorage.setItem(storageKey, JSON.stringify(draft));
      renderAssets();
    }

    function persistDraft(draft) {
      localStorage.setItem(storageKey, JSON.stringify(normalizeDraft(draft)));
      renderAssets();
    }

    function renderAssets() {
      const draft = loadDraft();
      document.getElementById("linkUrl").value = draft.linkUrl;
      document.getElementById("imageCount").textContent = draft.imageUrls.length + pendingImagePreviews.length;
      document.getElementById("linkCount").textContent = draft.linkUrl ? "1" : "0";
      const grid = document.getElementById("assetGrid");
      const imageEntries = [
        ...draft.imageUrls.map(url => ({ url, pending: false })),
        ...pendingImagePreviews.map(item => ({ url: item.url, pending: true })),
      ];
      if (!imageEntries.length) {
        grid.innerHTML = `<div class="empty">还没有图片资产。可以上传图片、拖拽图片，或直接粘贴截图。</div>`;
        return;
      }
      grid.innerHTML = imageEntries.map((entry, index) => {
        const url = entry.url;
        const previewUrl = imagePreviewUrl(url);
        return `
        <article class="asset-card">
          <a class="asset-preview" href="${escapeAttr(previewUrl)}" target="_blank" rel="noreferrer">
            <img src="${escapeAttr(previewUrl)}" alt="${escapeAttr(imageDisplayName(index))}" onerror="this.remove(); this.parentElement.textContent='图片预览失败'" />
          </a>
          <div class="asset-meta">
            <div class="asset-url" title="${escapeAttr(url)}">${escapeHtml(imageDisplayName(index))}</div>
            <div class="card-actions">
              ${entry.pending
                ? `<span class="pending-note">上传中...</span>`
                : `<button class="ghost" onclick="copyText('${escapeAttr(url)}')">复制</button>
                   <button class="danger" onclick="removeImage(${index})">删除</button>`}
            </div>
          </div>
        </article>
      `;
      }).join("");
    }

    function imageDisplayName(index) {
      return `图片 ${index + 1}`;
    }

    function imagePreviewUrl(url) {
      const value = String(url || "").trim();
      if (!value || value.startsWith("data:")) return value;
      return encodeURI(value);
    }

    function addImageUrls(urls) {
      const draft = loadDraft();
      const cleaned = urls.map(url => url.trim()).filter(Boolean);
      if (cleaned.some(url => !url.startsWith("data:") && url.length > maxUrlLength)) {
        setStatus("图片地址不能超过 500 个字符。", "error");
        return;
      }
      draft.imageUrls = unique([...draft.imageUrls, ...cleaned]).slice(0, maxImageCount);
      persistDraft(draft);
      if (draft.imageUrls.length >= maxImageCount) {
        setStatus(`最多支持 ${maxImageCount} 张图片。`, "error");
      }
    }

    async function removeImage(index) {
      const confirmed = await confirmDialog({
        title: "删除图片资产",
        message: `确认删除「图片 ${index + 1}」吗？提交后后台统计也会同步更新。`,
        okText: "删除",
      });
      if (!confirmed) return;
      const draft = loadDraft();
      draft.imageUrls.splice(index, 1);
      persistDraft(draft);
    }

    async function clearImages() {
      const draft = loadDraft();
      if (!draft.imageUrls.length) return;
      const confirmed = await confirmDialog({
        title: "清空图片资产",
        message: `确认清空已添加的 ${draft.imageUrls.length} 张图片吗？`,
        okText: "清空",
      });
      if (!confirmed) return;
      draft.imageUrls = [];
      persistDraft(draft);
      setStatus("已清空图片列表，保存后后台会同步更新。", "ok");
    }

    async function uploadSelectedFiles(files) {
      const imageFiles = [...(files || [])].filter(file => file.type.startsWith("image/"));
      if (!imageFiles.length) return;
      const currentCount = loadDraft().imageUrls.length + pendingImagePreviews.length;
      const availableSlots = Math.max(maxImageCount - currentCount, 0);
      const selectedFiles = imageFiles.slice(0, availableSlots);
      if (!selectedFiles.length) {
        setStatus(`最多支持 ${maxImageCount} 张图片。`, "error");
        return;
      }
      if (selectedFiles.length < imageFiles.length) {
        setStatus(`最多支持 ${maxImageCount} 张图片，已忽略超出的 ${imageFiles.length - selectedFiles.length} 张。`, "error");
      }
      setStatus(`正在上传 ${selectedFiles.length} 张图片...`, "");
      const uploadJobs = [];
      const uploadBatch = { uploaded: 0, total: selectedFiles.length };
      for (const file of selectedFiles) {
        const previewId = `${Date.now()}-${Math.random()}-${file.name}`;
        try {
          if (file.size > 8 * 1024 * 1024) {
            throw new Error(`${file.name} 超过 8MB`);
          }
          const dataUrl = await readFileAsDataUrl(file);
          pendingImagePreviews.push({ id: previewId, url: dataUrl });
          uploadJobs.push(uploadPendingImage(previewId, dataUrl, file.name, uploadBatch));
        } catch (error) {
          pendingImagePreviews = pendingImagePreviews.filter(item => item.id !== previewId);
          setStatus(error.message, "error");
        }
      }
      renderAssets();
      const results = await Promise.all(uploadJobs);
      const uploadedCount = results.filter(Boolean).length;
      if (uploadedCount) {
        setStatus(`已上传 ${uploadedCount} 张图片，记得点击保存同步统计。`, "ok");
      }
      document.getElementById("fileInput").value = "";
    }

    async function uploadPendingImage(previewId, dataUrl, fileName, uploadBatch) {
      try {
        const url = await uploadImage(dataUrl, fileName);
        pendingImagePreviews = pendingImagePreviews.filter(item => item.id !== previewId);
        addImageUrls([url]);
        uploadBatch.uploaded += 1;
        setStatus(`已上传 ${uploadBatch.uploaded} / ${uploadBatch.total} 张图片。`, "ok");
        return true;
      } catch (error) {
        pendingImagePreviews = pendingImagePreviews.filter(item => item.id !== previewId);
        renderAssets();
        setStatus(error.message, "error");
        return false;
      }
    }

    async function uploadImage(dataUrl, fileName) {
      if (taskId === "default") {
        return dataUrl;
      }
      const response = await fetch(taskAssetApi("upload-image"), {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify({ dataUrl, fileName }),
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.message || "图片上传失败");
      return result.imageUrl;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error(`${file.name} 读取失败`));
        reader.readAsDataURL(file);
      });
    }

    async function reloadContext() {
      if (taskId === "default") {
        renderFallback();
        return;
      }
      try {
        const response = await fetch(taskAssetApi("context"));
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || "读取任务失败");
        context = result;
        renderTaskDetails();
        syncDeliveryDraft(result.delivery);
        renderAssets();
      } catch (error) {
        setStatus(`读取任务详情失败：${error.message}`, "error");
        renderFallback();
      }
    }

    function renderFallback() {
      document.getElementById("taskTitle").textContent = `${taskNo} 任务详情`;
      document.getElementById("taskSub").textContent = "本地登记模式";
      document.getElementById("briefStatus").textContent = "未开始";
      document.getElementById("nextAction").textContent = "提交交付";
      document.getElementById("taskDetails").innerHTML = detailRows([
        ["任务名称", taskNo],
        ["状态", `<span class="tag">未开始</span>`],
        ["开始时间", "-"],
        ["截止时间", "-"],
        ["优先级", "-"],
        ["实际完成时间", "-"],
      ]);
    }

    function renderTaskDetails() {
      const task = context?.task || {};
      const project = context?.project || {};
      const item = context?.requirementItem || {};
      const workflow = context?.workflow || {};
      document.getElementById("taskTitle").textContent = task.task_name || `${taskNo} 任务详情`;
      document.getElementById("taskSub").textContent = `${task.task_no || taskNo} · ${project.project_name || "未关联项目"}`;
      document.getElementById("briefStatus").textContent = workflow.statusLabel || statusLabel(task.status);
      document.getElementById("nextAction").textContent = workflow.nextActionLabel || nextActionLabel(task.status);
      document.getElementById("taskDetails").innerHTML = detailRows([
        ["任务名称", escapeHtml(task.task_name || item.item_title || "-")],
        ["状态", `<span class="tag ${statusTone(task.status)}">${escapeHtml(statusLabel(task.status))}</span>`],
        ["开始时间", escapeHtml(formatDate(task.created_at))],
        ["截止时间", escapeHtml(formatDate(task.planned_end_at))],
        ["优先级", `<span class="tag warn">${escapeHtml(priorityLabel(task.priority))}</span>`],
        ["实际完成时间", escapeHtml(formatDate(task.actual_end_at))],
      ]);
    }

    function detailRows(rows) {
      return rows.map(([label, value]) => `
        <div class="detail-row">
          <div class="detail-label">${escapeHtml(label)}</div>
          <div class="detail-value">${value}</div>
        </div>
      `).join("");
    }

    async function saveDelivery() {
      saveDraft();
      if (pendingImagePreviews.length) {
        setStatus("图片还在上传中，请等上传完成后再提交交付。", "error");
        return;
      }
      const draft = loadDraft();
      const imageUrls = unique(draft.imageUrls.map(url => url.trim()).filter(Boolean));
      const linkUrl = draft.linkUrl.trim();
      if (!imageUrls.length && !linkUrl) {
        setStatus("请至少上传一张图片或填写一个合作链接后再提交交付。", "error");
        return;
      }
      const tooLongImageUrl = imageUrls.find(url => url.length > maxUrlLength);
      if (imageUrls.length > maxImageCount) {
        setStatus(`最多支持 ${maxImageCount} 张图片。`, "error");
        return;
      }
      if (tooLongImageUrl) {
        setStatus("图片地址异常，请刷新页面后重新上传这张图片。", "error");
        return;
      }
      if (linkUrl.length > maxUrlLength) {
        setStatus(`合作链接不能超过 ${maxUrlLength} 个字符。`, "error");
        return;
      }
      const button = document.getElementById("saveButton");
      button.disabled = true;
      setStatus("正在提交交付...", "");
      try {
        const response = await fetch(taskAssetApi("local-assets"), {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify({ imageUrls, linkUrl }),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || "同步失败");
        localStorage.setItem(storageKey, JSON.stringify(normalizeDraft({ imageUrls, linkUrl })));
        renderAssets();
        context = { ...(context || {}), task: result.task || context?.task, workflow: result.workflow || context?.workflow };
        renderTaskDetails();
        setStatus(`已提交 ${imageUrls.length} 张图片${linkUrl ? "和 1 个链接" : ""}，任务已进入待验收。正在返回执行人工作台...`, "ok");
        returnToAssigneeWorkspace(result.assigneeSession || context?.assigneeSession);
      } catch (error) {
        setStatus(`提交失败：${error.message}`, "error");
      } finally {
        button.disabled = false;
      }
    }

    function syncDeliveryDraft(delivery) {
      const serverDraft = normalizeDraft(delivery);
      const cachedRaw = localStorage.getItem(storageKey);
      if (!cachedRaw || serverDraft.imageUrls.length || serverDraft.linkUrl) {
        localStorage.setItem(storageKey, JSON.stringify(serverDraft));
      }
    }

    function closeAfterSubmit() {
      setTimeout(() => {
        window.close();
        setStatus("已提交成功，可以关闭当前页面。", "ok");
      }, 900);
    }

    function returnToAssigneeWorkspace(session) {
      const switched = applyAssigneeSession(session);
      setTimeout(() => {
        if (switched) {
          location.replace("/?taskSession=1");
          return;
        }
        window.close();
        setStatus("已提交成功，可以关闭当前页面。", "ok");
      }, 900);
    }

    function applyAssigneeSession(session) {
      const user = session?.user;
      const accessToken = session?.accessToken;
      if (!user?.username || !accessToken) return false;
      sessionStorage.setItem("xlyqTaskSession", JSON.stringify({ user, accessToken }));
      return true;
    }

    function setupUploadInteractions() {
      const zone = document.getElementById("uploadZone");
      zone.addEventListener("dragover", event => {
        event.preventDefault();
        zone.classList.add("dragover");
      });
      zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
      zone.addEventListener("drop", event => {
        event.preventDefault();
        zone.classList.remove("dragover");
        uploadSelectedFiles(event.dataTransfer.files);
      });
      document.addEventListener("paste", event => {
        const target = event.target;
        if (target?.tagName === "INPUT" || target?.tagName === "TEXTAREA") return;
        const files = [...(event.clipboardData?.files || [])].filter(file => file.type.startsWith("image/"));
        if (files.length) {
          event.preventDefault();
          uploadSelectedFiles(files);
        }
      });
    }

    function taskAssetApi(action) {
      return `/api/v1/tasks/${encodeURIComponent(taskId)}/asset-sheet/${action}?token=${encodeURIComponent(taskToken)}`;
    }

    function setStatus(message, type) {
      const status = document.getElementById("saveStatus");
      status.textContent = message;
      status.className = `status ${type || ""}`;
    }

    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value);
        setStatus("图片地址已复制。", "ok");
      } catch {
        setStatus("复制失败，请手动复制链接。", "error");
      }
    }

    function unique(values) {
      return values.filter((value, index, array) => array.indexOf(value) === index);
    }

    function statusLabel(status) {
      return {
        todo: "未开始",
        pending: "未开始",
        assigned: "已指派",
        in_progress: "进行中",
        blocked: "受阻",
        pending_review: "待验收",
        completed: "已完成",
        cancelled: "已取消",
        returned: "已退回",
      }[status] || status || "-";
    }

    function statusTone(status) {
      if (status === "completed") return "ok";
      if (status === "blocked" || status === "returned") return "warn";
      return "";
    }

    function nextActionLabel(status) {
      return {
        todo: "等待指派执行人",
        pending: "等待处理",
        assigned: "填写项目资产",
        in_progress: "提交交付",
        blocked: "处理阻塞后提交交付",
        pending_review: "等待管理者验收",
        completed: "已完成",
        returned: "根据反馈修改后重新提交",
      }[status] || "暂无下一步";
    }

    function priorityLabel(priority) {
      return { high: "P0", medium: "P1", low: "P2" }[priority] || "P3";
    }

    function formatDate(value) {
      const date = value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return "-";
      return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}`;
    }

    function escapeHtml(value) {
      return String(value ?? "-")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    setupUploadInteractions();
    renderAssets();
    reloadContext();
  </script>
</body>
</html>
